<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Page Not Found | Rick Justine Pabalan</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="error-container">
        <div class="glass glass--strong error-card fade-in">
            <div class="error-code">ERROR</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-msg">
                The link you followed may be broken or the page has been moved.<br>
                You will be redirected to the homepage in <span id="timer" class="countdown">5</span> seconds.
            </p>
            <a href="index.html" class="btn-glass btn-accent w-100">
                <span>Go Home Now</span>
                <svg class="ms-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <script src="assets/js/error.js"></script>
</body>
</html>
